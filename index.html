<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2TJ29KSJP4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2TJ29KSJP4');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Drift - Programming & English Edition (v2.0.0)</title>
    <style>
        :root {
            --bg-color: #0d0f14;
            --container-bg: #161a23;
            --accent-cyan: #00f2fe;
            --accent-magenta: #ff007f;
            --text-main: #f0f3f8;
            --text-muted: #6c7a9c;
            --correct-color: #39ff14;
            --incorrect-color: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            background: var(--container-bg);
            border: 2px solid #232d3f;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* Screens */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen */
        .btn {
            background: linear-gradient(135deg, var(--accent-cyan), #4facfe);
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        /* Game Screen */
        .track-container {
            width: 100%;
            height: 40px;
            background: #1f2633;
            border-radius: 20px;
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #2d384e;
            overflow: hidden;
        }

        .track-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: dashed #415274;
            transform: translateY(-50%);
        }

        .car-avatar {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            transition: left 0.2s cubic-bezier(0.1, 0.8, 0.3, 1);
            filter: drop-shadow(0 0 5px var(--accent-cyan));
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 35px;
            background: #1c2330;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #2a354a;
        }

        .stat-box .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-cyan);
        }

        .word-display {
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.6;
            min-height: 60px;
            background: #11161f;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-magenta);
            text-align: left;
            word-break: break-all;
        }

        .char-correct {
            color: var(--correct-color);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
            border-bottom: 2px solid transparent;
        }

        .char-current {
            background-color: rgba(0, 242, 254, 0.3);
            border-bottom: 2px solid var(--accent-cyan);
            color: var(--text-main);
            animation: blink 1s infinite;
        }

        .char-incorrect {
            color: var(--incorrect-color);
            background-color: rgba(255, 51, 51, 0.2);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        @keyframes blink {
            50% { background-color: transparent; border-bottom-color: transparent; }
        }

        /* Input Shield (invisible listener fallback but we use window listener) */
        .hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Result Screen */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .result-card {
            background: #1c2330;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a354a;
        }

        .result-card .res-val {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-magenta);
            margin-top: 5px;
        }

        .rank-banner {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--correct-color);
            margin: 25px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .focus-notice {
            color: var(--accent-magenta);
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0.8;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TYPING DRIFT</h1>
    <div class="subtitle">v2.0.0 大容量25問選抜・GA4アナリティクス連動版</div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <p style="margin-bottom: 25px; line-height: 1.6; color: var(--text-main);">
            プログラミング基本構文＆高校英語から厳選された<b>全25問</b>のタイピングコース。<br>
            ミスを抑えてトップスピードで駆け抜けろ！
        </p>
        <button class="btn" onclick="startGame()">DRIVE START</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <!-- Progress Track -->
        <div class="track-container">
            <div class="track-line"></div>
            <div id="car" class="car-avatar">🏎️</div>
        </div>

        <!-- Realtime Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="label">Progress</div>
                <div id="stat-progress" class="value">1 / 25</div>
            </div>
            <div class="stat-box">
                <div class="label">WPM</div>
                <div id="stat-wpm" class="value">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Accuracy</div>
                <div id="stat-accuracy" class="value">100%</div>
            </div>
        </div>

        <!-- Sentence Display -->
        <div id="word-display" class="word-display"></div>
        <div id="focus-notice" class="focus-notice">⚠️ 画面をクリックしてタイピングを再開してください</div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <h2>MISSION ACCOMPLISHED!</h2>
        <div class="rank-banner" id="res-rank">-</div>

        <div class="results-grid">
            <div class="result-card">
                <div class="label">タイピング速度 (WPM)</div>
                <div class="res-val" id="res-wpm">0</div>
            </div>
            <div class="result-card">
                <div class="label">正確性 (Accuracy)</div>
                <div class="res-val" id="res-accuracy">0%</div>
            </div>
        </div>

        <button class="btn" onclick="restartGame()">RETRY DRIFT</button>
    </div>
</div>

<script>
    // 25 Custom personalized phrases (Python basic syntax + Freshman level English + Drift themes)
    const PHRASES = [
        'print("Hello, World!")',
        'import random',
        'for i in range(5):',
        'if speed > 100:',
        'def drive_car():',
        'learning to code is fun',
        'python study sidebar',
        'github pages deployment',
        'skyline r34 gt-r',
        'drift around the corner',
        'break through the wall',
        'never give up coding',
        'high school freshman',
        'variable assignment',
        'while loop execution',
        'list comprehension',
        'execute the script',
        'debugging the error',
        'open source repository',
        'google analytics tracking',
        'note article publication',
        'full speed ahead',
        'perfect accuracy bonus',
        'master of programming',
        'mission accomplished'
    ];

    let currentIndex = 0;
    let currentCharIndex = 0;
    let startTime = null;
    let totalKeystrokes = 0;
    let correctKeystrokes = 0;
    let gameActive = false;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const resultScreen = document.getElementById('result-screen');
    const wordDisplay = document.getElementById('word-display');
    const car = document.getElementById('car');
    const focusNotice = document.getElementById('focus-notice');

    // UI Updates
    const statProgress = document.getElementById('stat-progress');
    const statWpm = document.getElementById('stat-wpm');
    const statAccuracy = document.getElementById('stat-accuracy');

    function startGame() {
        startScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        gameScreen.classList.add('active');
        
        currentIndex = 0;
        currentCharIndex = 0;
        totalKeystrokes = 0;
        correctKeystrokes = 0;
        startTime = Date.now();
        gameActive = true;

        updateProgress();
        renderPhrase();
        
        // GA4 Custom Event: Game Start
        if (typeof gtag === 'function') {
            gtag('event', 'game_start', {
                'event_category': 'Game',
                'event_label': 'Typing Drift v2.0.0'
            });
        }
    }

    function renderPhrase() {
        const currentPhrase = PHRASES[currentIndex];
        wordDisplay.innerHTML = '';
        for (let i = 0; i < currentPhrase.length; i++) {
            const span = document.createElement('span');
            span.textContent = currentPhrase[i];
            if (i === currentCharIndex) {
                span.className = 'char-current';
            }
            wordDisplay.appendChild(span);
        }
    }

    function updateProgress() {
        statProgress.textContent = `${currentIndex + 1} / ${PHRASES.length}`;
        const progressPercent = (currentIndex / PHRASES.length) * 100;
        car.style.left = `${progressPercent}%`;
    }

    // Real-time WPM & Accuracy math
    function updateLiveStats() {
        if (!startTime) return;
        const elapsedMinutes = (Date.now() - startTime) / 60000;
        
        // WPM calculation (standard: 5 keystrokes = 1 word)
        const wpm = elapsedMinutes > 0 ? Math.round((correctKeystrokes / 5) / elapsedMinutes) : 0;
        statWpm.textContent = wpm;

        const accuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;
        statAccuracy.textContent = `${accuracy}%`;
    }

    // Capture standard keystrokes
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;

        // Ignore utility keys (Shift, Ctrl, Alt, etc.)
        if (e.key.length !== 1) return;

        totalKeystrokes++;
        const currentPhrase = PHRASES[currentIndex];
        const targetChar = currentPhrase[currentCharIndex];

        const spans = wordDisplay.querySelectorAll('span');

        if (e.key === targetChar) {
            correctKeystrokes++;
            spans[currentCharIndex].className = 'char-correct';
            currentCharIndex++;

            if (currentCharIndex >= currentPhrase.length) {
                // Phrase complete
                currentIndex++;
                currentCharIndex = 0;
                
                if (currentIndex >= PHRASES.length) {
                    endGame();
                    return;
                }
                updateProgress();
            }
        } else {
            // Miskey
            spans[currentCharIndex].className = 'char-current char-incorrect';
        }

        if (gameActive) {
            if (spans[currentCharIndex]) {
                spans[currentCharIndex].className = 'char-current';
            }
            updateLiveStats();
        }
    });

    function endGame() {
        gameActive = false;
        gameScreen.classList.remove('active');
        resultScreen.classList.add('active');

        const elapsedMinutes = (Date.now() - startTime) / 60000;
        const finalWpm = Math.round((correctKeystrokes / 5) / elapsedMinutes);
        const finalAccuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;

        document.getElementById('res-wpm').textContent = finalWpm;
        document.getElementById('res-accuracy').textContent = `${finalAccuracy}%`;

        // Rank determination
        let rank = 'NOVICE DRIVER';
        if (finalWpm >= 60 && finalAccuracy >= 95) rank = 'LEGENDARY DRIFTER (R34 CLASS)';
        else if (finalWpm >= 45 && finalAccuracy >= 90) rank = 'PRO RACER';
        else if (finalWpm >= 30) rank = 'STREET RACER';

        document.getElementById('res-rank').textContent = rank;

        // GA4 Custom Event: Game End (with custom dimensions)
        if (typeof gtag === 'function') {
            gtag('event', 'game_complete', {
                'score_wpm': finalWpm,
                'score_accuracy': finalAccuracy,
                'driver_rank': rank
            });
        }
    }

    function restartGame() {
        startGame();
    }

    // Tab Focus warning fallback
    window.addEventListener('blur', () => {
        if (gameActive) focusNotice.style.display = 'block';
    });
    window.addEventListener('focus', () => {
        focusNotice.style.display = 'none';
    });
</script>

</body>
</html>
