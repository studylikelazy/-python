<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2TJ29KSJP4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2TJ29KSJP4');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Drift - Custom Code Edition (v2.0.0)</title>
    <style>
        :root {
            --bg-color: #0d0f14;
            --container-bg: #161a23;
            --accent-cyan: #00f2fe;
            --accent-magenta: #ff007f;
            --text-main: #f0f3f8;
            --text-muted: #6c7a9c;
            --correct-color: #39ff14;
            --incorrect-color: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            background: var(--container-bg);
            border: 2px solid #232d3f;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* Screens */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen (Custom Code Input) */
        .instruction {
            margin-bottom: 20px;
            line-height: 1.6;
            color: var(--text-main);
            text-align: left;
        }

        .code-input-area {
            width: 100%;
            height: 200px;
            background: #11161f;
            border: 1px solid #2a354a;
            border-radius: 12px;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            margin-bottom: 20px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .code-input-area:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-cyan), #4facfe);
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        /* Game Screen */
        .track-container {
            width: 100%;
            height: 40px;
            background: #1f2633;
            border-radius: 20px;
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #2d384e;
            overflow: hidden;
        }

        .track-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: dashed #415274;
            transform: translateY(-50%);
        }

        .car-avatar {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            transition: left 0.2s cubic-bezier(0.1, 0.8, 0.3, 1);
            filter: drop-shadow(0 0 5px var(--accent-cyan));
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 35px;
            background: #1c2330;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #2a354a;
        }

        .stat-box .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-cyan);
        }

        .word-display {
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.6;
            min-height: 80px;
            background: #11161f;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-magenta);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', Courier, monospace;
        }

        .char-correct {
            color: var(--correct-color);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
        }

        .char-current {
            background-color: rgba(0, 242, 254, 0.3);
            border-bottom: 2px solid var(--accent-cyan);
            color: var(--text-main);
            animation: blink 1s infinite;
        }

        .char-incorrect {
            color: var(--incorrect-color);
            background-color: rgba(255, 51, 51, 0.2);
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        @keyframes blink {
            50% { background-color: transparent; border-bottom-color: transparent; }
        }

        /* Result Screen */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .result-card {
            background: #1c2330;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a354a;
        }

        .result-card .res-val {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-magenta);
            margin-top: 5px;
        }

        .rank-banner {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--correct-color);
            margin: 25px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .focus-notice {
            color: var(--accent-magenta);
            font-size: 0.9rem;
            margin-top: 15px;
            opacity: 0.8;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TYPING DRIFT</h1>
    <div class="subtitle">v2.0.0 コード持ち込みカスタム機能・GA4連動完全版</div>

    <!-- START SCREEN (Code Input) -->
    <div id="start-screen" class="screen active">
        <div class="instruction">
            <h3>【コード持ち込み機能】</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">
                練習したいPythonやJavaScriptなどのソースコード、またはテキストを下のエリアに貼り付けてください。自分だけのオリジナルコースでドリフトを開始できます！
            </p>
        </div>
        <textarea id="custom-code-input" class="code-input-area" placeholder='# ここに自分のコードを貼り付けてください&#10;print("Hello, World!")&#10;for i in range(5):&#10;    print(i)'></textarea>
        <br>
        <button class="btn" onclick="startGame()">DRIVE START</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <!-- Progress Track -->
        <div class="track-container">
            <div class="track-line"></div>
            <div id="car" class="car-avatar">🏎️</div>
        </div>

        <!-- Realtime Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="label">Progress</div>
                <div id="stat-progress" class="value">0%</div>
            </div>
            <div class="stat-box">
                <div class="label">WPM</div>
                <div id="stat-wpm" class="value">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Accuracy</div>
                <div id="stat-accuracy" class="value">100%</div>
            </div>
        </div>

        <!-- Sentence Display -->
        <div id="word-display" class="word-display"></div>
        <div id="focus-notice" class="focus-notice">⚠️ 画面をクリックしてタイピングを再開してください</div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <h2>MISSION ACCOMPLISHED!</h2>
        <div class="rank-banner" id="res-rank">-</div>

        <div class="results-grid">
            <div class="result-card">
                <div class="label">タイピング速度 (WPM)</div>
                <div class="res-val" id="res-wpm">0</div>
            </div>
            <div class="result-card">
                <div class="label">正確性 (Accuracy)</div>
                <div class="res-val" id="res-accuracy">0%</div>
            </div>
        </div>

        <button class="btn" onclick="restartGame()">RETRY DRIFT</button>
    </div>
</div>

<script>
    let textToType = "";
    let currentCharIndex = 0;
    let startTime = null;
    let totalKeystrokes = 0;
    let correctKeystrokes = 0;
    let gameActive = false;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const resultScreen = document.getElementById('result-screen');
    const wordDisplay = document.getElementById('word-display');
    const car = document.getElementById('car');
    const focusNotice = document.getElementById('focus-notice');
    const customCodeInput = document.getElementById('custom-code-input');

    // UI Updates
    const statProgress = document.getElementById('stat-progress');
    const statWpm = document.getElementById('stat-wpm');
    const statAccuracy = document.getElementById('stat-accuracy');

    // Default template text if input is empty
    const defaultCode = `print("Hello, World!")\nimport random\nfor i in range(5):\n    print("Drifting...")`;

    function startGame() {
        // Fetch input text
        let rawInput = customCodeInput.value.trim();
        if (!rawInput) {
            textToType = defaultCode;
        } else {
            textToType = rawInput;
        }

        startScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        gameScreen.classList.add('active');
        
        currentCharIndex = 0;
        totalKeystrokes = 0;
        correctKeystrokes = 0;
        startTime = Date.now();
        gameActive = true;

        updateProgress();
        renderText();
        
        // GA4 Custom Event: Game Start
        if (typeof gtag === 'function') {
            gtag('event', 'game_start', {
                'event_category': 'Game',
                'event_label': 'Typing Drift Custom Edition'
            });
        }
    }

    function renderText() {
        wordDisplay.innerHTML = '';
        for (let i = 0; i < textToType.length; i++) {
            const span = document.createElement('span');
            // Show visible block for line breaks to guide the user
            if (textToType[i] === '\n') {
                span.innerHTML = '↵\n';
            } else {
                span.textContent = textToType[i];
            }
            
            if (i === currentCharIndex) {
                span.className = 'char-current';
            }
            wordDisplay.appendChild(span);
        }
        scrollCurrentCharIntoView();
    }

    function scrollCurrentCharIntoView() {
        const currentSpan = wordDisplay.children[currentCharIndex];
        if (currentSpan) {
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function updateProgress() {
        const progressPercent = textToType.length > 0 ? Math.round((currentCharIndex / textToType.length) * 100) : 0;
        statProgress.textContent = `${progressPercent}%`;
        car.style.left = `${progressPercent}%`;
    }

    function updateLiveStats() {
        if (!startTime) return;
        const elapsedMinutes = (Date.now() - startTime) / 60000;
        
        const wpm = elapsedMinutes > 0 ? Math.round((correctKeystrokes / 5) / elapsedMinutes) : 0;
        statWpm.textContent = wpm;

        const accuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;
        statAccuracy.textContent = `${accuracy}%`;
    }

    // Capture standard keystrokes
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;

        let targetChar = textToType[currentCharIndex];
        let inputKey = e.key;

        // Handle Enter key for line breaks
        if (targetChar === '\n' && inputKey === 'Enter') {
            inputKey = '\n';
        }

        // Ignore utility keys except Enter
        if (e.key.length !== 1 && e.key !== 'Enter') return;
        
        // Prevent default browser action for Space and Enter to avoid page scrolling
        if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
        }

        totalKeystrokes++;
        const spans = wordDisplay.querySelectorAll('span');

        if (inputKey === targetChar) {
            correctKeystrokes++;
            spans[currentCharIndex].className = 'char-correct';
            currentCharIndex++;

            if (currentCharIndex >= textToType.length) {
                endGame();
                return;
            }
            updateProgress();
        } else {
            spans[currentCharIndex].className = 'char-current char-incorrect';
        }

        if (gameActive) {
            if (spans[currentCharIndex]) {
                spans[currentCharIndex].className = 'char-current';
            }
            scrollCurrentCharIntoView();
            updateLiveStats();
        }
    });

    function endGame() {
        gameActive = false;
        gameScreen.classList.remove('active');
        resultScreen.classList.add('active');

        const elapsedMinutes = (Date.now() - startTime) / 60000;
        const finalWpm = Math.round((correctKeystrokes / 5) / elapsedMinutes);
        const finalAccuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;

        document.getElementById('res-wpm').textContent = finalWpm;
        document.getElementById('res-accuracy').textContent = `${finalAccuracy}%`;

        // Rank determination
        let rank = 'NOVICE DRIVER';
        if (finalWpm >= 60 && finalAccuracy >= 95) rank = 'LEGENDARY DRIFTER (R34 CLASS)';
        else if (finalWpm >= 45 && finalAccuracy >= 90) rank = 'PRO RACER';
        else if (finalWpm >= 30) rank = 'STREET RACER';

        document.getElementById('res-rank').textContent = rank;

        // GA4 Custom Event: Game End
        if (typeof gtag === 'function') {
            gtag('event', 'game_complete', {
                'score_wpm': finalWpm,
                'score_accuracy': finalAccuracy,
                'driver_rank': rank
            });
        }
    }

    function restartGame() {
        startScreen.classList.add('active');
        gameScreen.classList.remove('active');
        resultScreen.classList.remove('active');
    }

    // Tab Focus warning fallback
    window.addEventListener('blur', () => {
        if (gameActive) focusNotice.style.display = 'block';
    });
    window.addEventListener('focus', () => {
        focusNotice.style.display = 'none';
    });
</script>

</body>
</html>
